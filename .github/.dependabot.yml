---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      include: scope
      prefix: "Actions"
    reviewers:
      - "TykTechnologies/engineering"

  - package-ecosystem: gomod
    directory: /jira-linter
    schedule:
      interval: weekly
    commit-message:
      include: scope
      prefix: "Go"
    reviewers:
      - "TykTechnologies/engineering"
