name: 'Test Configuration Controller'
description: 'Fetches test configuration parameters from an internal API based on variation, repository, and test type'
author: 'konrad'
inputs:
  variation:
    description: 'Variation of data configs, e.g. prod-variations'
    required: true
  base_ref:
    description: 'Base ref for the test'
    required: true
  test_type:
    description: 'Type of test, e.g. api or ui'
    required: true
  fallback_ref:
    description: 'Branch to fall back to when base_ref has no config in the API'
    required: false
    default: 'default'
outputs:
  envfiles:
    description: 'Environment files for the test'
    value: ${{ steps.params.outputs.envfiles }}
  pump:
    description: 'Pump image for the test'
    value: ${{ steps.params.outputs.pump }}
  sink:
    description: 'Sink image for the test'
    value: ${{ steps.params.outputs.sink }}
runs:
  using: "composite"
  steps:
    - name: fetch env from tyk-pro
      shell: bash
      id: params
      env:
        BASE_REF: ${{ inputs.base_ref }}
        VARIATION: ${{ inputs.variation }}
        REPO_NAME: ${{ github.event.repository.name }}
        TEST_TYPE: ${{ inputs.test_type }}
        TRIGGER: ${{ github.event_name }}
        FALLBACK_REF: ${{ inputs.fallback_ref }}
      run: |
        set -eo pipefail
        BASE_URL="http://tui.internal.dev.tyk.technology/v2/$VARIATION/$REPO_NAME"
        ENDPOINT="$TRIGGER/$TEST_TYPE.gho"

        HTTP_CODE=$(curl -s --retry 2 --retry-delay 10 \
          -w "%{http_code}" -o /tmp/tui_response.txt \
          "$BASE_URL/$BASE_REF/$ENDPOINT")

        if [ "$HTTP_CODE" = "404" ]; then
          echo "::warning::No test config for branch '$BASE_REF', falling back to '$FALLBACK_REF'"
          curl -s --retry 2 --retry-delay 10 --fail-with-body \
            "$BASE_URL/$FALLBACK_REF/$ENDPOINT" | tee -a "$GITHUB_OUTPUT"
        elif [ "$HTTP_CODE" != "200" ]; then
          echo "API returned HTTP $HTTP_CODE for branch '$BASE_REF'" >&2
          cat /tmp/tui_response.txt >&2
          exit 1
        else
          cat /tmp/tui_response.txt | tee -a "$GITHUB_OUTPUT"
        fi

        if ! [[ $VARIATION =~ prod ]] ;then
          echo "::warning file=.github/workflows/release.yml,line=24,col=1,endColumn=8::Using non-prod variation"
          echo "### :warning: You are using VARIATION=${VARIATION} in test-controller-{{ .test }}" >> $GITHUB_STEP_SUMMARY
        fi
