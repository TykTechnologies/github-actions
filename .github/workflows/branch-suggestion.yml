name: Branch Suggestion for PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:
    secrets:
      JIRA_TOKEN:
        required: true
        description: 'Raw JIRA API token'
      JIRA_EMAIL:
        required: true
        description: 'JIRA account email'

permissions:
  pull-requests: write
  contents: read

jobs:
  suggest-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout github-actions repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: TykTechnologies/github-actions
          ref: ${{ github.repository == 'TykTechnologies/github-actions' && github.ref || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: branch-suggestion
        run: npm install --ignore-scripts

      - name: Install Visor
        run: npm install -g @probelabs/visor@0.1.185 --ignore-scripts

      - name: Analyze PR and suggest branches
        working-directory: branch-suggestion
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          visor --config branch_suggestion.yml --debug --tags remote
