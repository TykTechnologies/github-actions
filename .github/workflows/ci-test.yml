name: CI Tests

on:
  push:
    branches:
      - main
      - 'release-*'
    paths:
      - 'branch-suggestion/**'
      - 'jira-linter/**'
      - '.github/workflows/ci-test.yml'
  pull_request:
    paths:
      - 'branch-suggestion/**'
      - 'jira-linter/**'
      - '.github/workflows/ci-test.yml'

jobs:
  test-branch-suggestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: branch-suggestion/package-lock.json

      - name: Install dependencies
        working-directory: branch-suggestion
        run: npm ci --ignore-scripts

      - name: Run tests
        working-directory: branch-suggestion
        run: npm test

      - name: Generate coverage report
        working-directory: branch-suggestion
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        if: always()
        with:
          files: ./branch-suggestion/coverage/coverage-final.json
          flags: branch-suggestion

  test-jira-linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.24.7'

      - name: Run tests
        working-directory: jira-linter
        run: go test ./...
