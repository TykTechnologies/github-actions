name: Create or update a GitHub comment

on:
  workflow_call:
    inputs:
      comment-author:
        type: string
        default: ""
        description: "The author of the comment to find."
      body-includes:
        type: string
        default: ""
        description: "The text to search for in the comment body."
      body: 
        required: true
        type: string
        description: "The text to add to the comment body."

jobs:
  create-update-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Find Comment
        uses: peter-evans/find-comment@a54c31d7fa095754bfef525c0c8e5e5674c4b4b1  # v2
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: ${{ inputs.comment-author }}
          body-includes: ${{ inputs.body-includes }}

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@23ff15729ef2fc348714a3bb66d2f655ca9066f2  # v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ inputs.body }}
          edit-mode: replace
