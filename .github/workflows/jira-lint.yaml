name: JIRA linter

on:
  workflow_call:
    secrets:
      JIRA_TOKEN:
        required: true
      PROBE_APP_ID:
        required: true
      PROBE_APP_PRIVATE_KEY:
        required: true

jobs:
  jira-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - uses: cyrus-za/jira-lint@68fe771c843a59c7c7020e6b98817897abecb44b  # master
        name: jira-lint
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          jira-base-url: https://tyktech.atlassian.net/
          skip-branches: '^(release-[0-9.-]+(lts)?|master|main)$'
          validate_issue_status: true
          allowed_issue_statuses: "In Dev,In Code Review,Ready for Testing,In Test,In Progress,In Review"
