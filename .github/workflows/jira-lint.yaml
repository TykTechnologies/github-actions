name: JIRA linter

on:
  workflow_call:
    secrets:
      JIRA_USER_EMAIL:
        required: true
      JIRA_TOKEN:
        required: true

permissions:
  pull-requests: write
  contents: read

jobs:
  jira-lint:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout github-actions PR code
        if: github.repository == 'TykTechnologies/github-actions' && github.event_name == 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkout github-actions main for external repos
        if: github.repository != 'TykTechnologies/github-actions' || github.event_name != 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: TykTechnologies/github-actions
          ref: main

      - name: Lint PR based on attached Jira ticket
        uses: ./jira-linter
        with:
          jira-base-url: 'https://tyktech.atlassian.net'
          jira-user-email: ${{ secrets.JIRA_USER_EMAIL }}
          jira-api-token: ${{ secrets.JIRA_TOKEN }}
