name: OWASP scanner 

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

jobs:
  zap_scan:
    name: OWASP Zap
    runs-on: ubuntu-latest
    steps:
      - name: OWASP Zap
        uses: zaproxy/action-full-scan@6eade0f93b10fad8cfb4e63b979703a2cbd0cc98  # v0.4.0
        with:
          target: ${{ inputs.target }}
          cmd_options: '-a'
          allow_issue_writing: false
