version: "1.0"

# Visor configuration for Branch Suggestion automation
# Analyzes JIRA fix versions and suggests appropriate merge target branches
# based on the repository's branching strategy

checks:
  # ============================================================================
  # COMBINED STEP: ANALYZE AND SUGGEST BRANCHES
  # ============================================================================
  # Combines all steps into one to avoid Visor's output passing limitations:
  # 1. Extract JIRA ticket from PR title/branch
  # 2. Fetch fix versions from JIRA
  # 3. Fetch repository branches
  # 4. Match and suggest branches
  analyze-and-suggest:
    type: command
    tags: ["remote"]
    timeout: 90000
    exec: |
      set -e

      # Early exit if PR is closed but not merged (avoid unnecessary API calls)
      if [ "$PR_ACTION" == "closed" ] && [ "$PR_MERGED" != "true" ]; then
        echo "ℹ️  PR closed without merge. Skipping analysis."
        exit 0
      fi

      # Read from environment variables with defaults for local testing
      PR_TITLE="${PR_TITLE:-TT-12345: Test PR}"
      BRANCH_NAME="${BRANCH_NAME:-feature/TT-12345-test}"
      REPO="${REPOSITORY:-TykTechnologies/tyk}"

      # Visor can execute this check from a fresh temporary worktree.
      # Install dependencies there when node_modules is not present.
      if [ ! -d node_modules ]; then
        npm ci --ignore-scripts
      fi

      set +e
      JIRA_ERROR_FILE=$(mktemp)
      JIRA_RESULT=$(node scripts/jira/get-fixedversion.js "$PR_TITLE" "$BRANCH_NAME" 2>"$JIRA_ERROR_FILE")
      JIRA_EXIT_CODE=$?
      JIRA_ERROR=$(cat "$JIRA_ERROR_FILE")
      rm -f "$JIRA_ERROR_FILE"
      set -e

      # Handle exit codes
      if [ $JIRA_EXIT_CODE -eq 2 ]; then
        echo "ℹ️  No JIRA ticket found. Skipping branch suggestions." >&2
        exit 0
      fi
      if [ $JIRA_EXIT_CODE -eq 1 ]; then
        MESSAGE=$(printf 'JIRA API or configuration error: %s' "${JIRA_ERROR:-Unknown error}")
        jq -n --arg message "$MESSAGE" '[{
          file: "branch-suggestion",
          line: 0,
          message: $message,
          severity: "critical",
          ruleId: "command/execution_error"
        }]'
        exit 0
      fi
      if [ $JIRA_EXIT_CODE -eq 3 ]; then
        echo '[{"file": "branch-suggestion", "line": 0, "message": "JIRA ticket found but no fix versions set.", "severity": "info", "ruleId": "command/execution_info"}]'
        exit 0
      fi

      # Fetch repository branches
      # Check if gh CLI is available
      if command -v gh &> /dev/null; then
        BRANCHES=$(gh api "repos/$REPO/branches" --paginate | jq -c '[.[] | {name: .name}]')
      else
        # Use curl with GitHub API
        if [ -n "$GITHUB_TOKEN" ]; then
          BRANCHES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/branches?per_page=100" | \
            jq -c '[.[] | {name: .name}]')
        else
          BRANCHES=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/branches?per_page=100" | \
            jq -c '[.[] | {name: .name}]')
        fi
      fi

      # Match branches and generate suggestions
      MATCH_RESULT=$(node scripts/common/match-branches.js "$JIRA_RESULT" "$BRANCHES" "$REPO")

      # Extract markdown and save for PR comment (use printf to avoid escape sequence issues)
      printf '%s\n' "$MATCH_RESULT" | jq -r '.markdown' > /tmp/branch_suggestion_markdown.txt

      # Save full JSON result for other steps
      printf '%s\n' "$MATCH_RESULT" > /tmp/branch_suggestion_results.json

      # Output full result to stdout
      printf '%s\n' "$MATCH_RESULT"

  # ============================================================================
  # STEP 2: POST COMMENT TO PR
  # ============================================================================
  # Creates or updates a comment on the PR with branch suggestions
  # ============================================================================
  post-pr-comment:
    type: command
    depends_on: [analyze-and-suggest]
    tags: ["remote"]
    timeout: 30000
    exec: |
      set -e

      # Read from environment variables with defaults for local testing
      REPO="${REPOSITORY:-TykTechnologies/tyk}"
      PR_NUMBER="${PR_NUMBER:-123}"

      # Check if markdown file exists from previous step
      if [ ! -f /tmp/branch_suggestion_markdown.txt ]; then
        echo "ℹ️  Markdown file not found. analyze-and-suggest step may have exited early with info severity." >&2
        exit 0
      fi

      # Post or update the comment
      node scripts/github/add-pr-comment.js "$REPO" "$PR_NUMBER" --file /tmp/branch_suggestion_markdown.txt

      # Clean up
      rm -f /tmp/branch_suggestion_markdown.txt

  # ============================================================================
  # STEP 3: POST RELEASE COMMANDS ON MERGE
  # ============================================================================
  # Automatically posts /release comments when a PR is merged
  # ============================================================================
  post-release-commands:
    type: command
    depends_on: [analyze-and-suggest]
    tags: ["remote"]
    timeout: 30000
    exec: |
      set -e

      # Only run if the PR was merged
      if [ "$PR_MERGED" != "true" ]; then
        echo "ℹ️  PR not merged. Skipping release commands."
        rm -f /tmp/branch_suggestion_results.json
        exit 0
      fi

      # Read from environment variables with defaults for local testing
      REPO="${REPOSITORY:-TykTechnologies/tyk}"
      PR_NUMBER="${PR_NUMBER:-123}"

      if [ ! -f /tmp/branch_suggestion_results.json ]; then
        echo "ℹ️  Results file not found. Skipping release commands." >&2
        exit 0
      fi

      # Post release comments
      node scripts/github/post-release-commands.js "$REPO" "$PR_NUMBER" "$(cat /tmp/branch_suggestion_results.json)"

      # Clean up
      rm -f /tmp/branch_suggestion_results.json
