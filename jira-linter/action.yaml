name: 'Jira PR Validator'
description: 'Ensures pull requests align with the Jira tickets'

inputs:
  jira-base-url:
    description: 'The base URL of your Jira instance (e.g., https://tyktech.atlassian.net).'
    required: true
  jira-user-email:
    description: 'The email of the user account associated with the Jira API token.'
    required: true
  jira-api-token:
    description: 'The API token for your Jira account.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version: '1.24.7'

    - name: Build Jira Linter
      shell: bash
      run: |
        cd ${{ github.action_path }}
        go install ./cmd/linter

    - name: Run Jira Linter
      id: linter_step
      shell: bash
      continue-on-error: true
      run: |
        BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
        echo "--> running the linter against $BRANCH_NAME branch"
        linter --branch="$BRANCH_NAME" 2> ${{ github.action_path }}/stderr.txt
      env:
        JL_JIRA_BASEURL: ${{ inputs.jira-base-url }}
        JL_JIRA_USEREMAIL: ${{ inputs.jira-user-email }}
        JL_JIRA_APITOKEN: ${{ inputs.jira-api-token }}
        # the following environment variables will be populated for each PR by GitHub itself.
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        JL_PR_NUMBER: ${{ github.event.pull_request.number }}
        JL_PR_TITLE: ${{ github.event.pull_request.title }}
    - name: Prepare Failure Comment Body
      if: steps.linter_step.outcome == 'failure'
      shell: bash
      run: |
        BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
        COMMIT_HASH="${{ github.event.pull_request.head.sha || github.sha }}"
        COMMIT_SHORT="${COMMIT_HASH:0:7}"
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

        cat > ${{ github.action_path }}/linter-output.txt << EOF
        ## 🚨 Jira Linter Failed

        **Commit:** [\`${COMMIT_SHORT}\`](${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_HASH})
        **Failed at:** ${TIMESTAMP}

        The Jira linter failed to validate your PR. Please check the error details below:

        <details>
        <summary>🔍 Click to view error details</summary>

        \`\`\`
        $(cat ${{ github.action_path }}/stderr.txt)
        \`\`\`

        </details>

        ### Next Steps
        - Ensure your branch name contains a valid Jira ticket ID (e.g., \`ABC-123\`)
        - Verify your PR title matches the branch's Jira ticket ID
        - Check that the Jira ticket exists and is accessible

        ---
        _This comment will be automatically deleted once the linter passes._

        <!-- jira-linter-comment-marker -->
        EOF

    - name: Post Sticky Comment on Failure
      if: steps.linter_step.outcome == 'failure'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: jira-linter
        path: ${{ github.action_path }}/linter-output.txt
        recreate: true

    - name: Delete Sticky Comment on Success
      if: steps.linter_step.outcome == 'success'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: jira-linter
        delete: true

    - name: Fail Action if Linter Failed
      if: steps.linter_step.outcome == 'failure'
      shell: bash
      run: |
        echo "❌ Jira Linter failed - failing the action"
        exit 1
